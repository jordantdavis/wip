name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make release-darwin-arm64 VERSION=${{ github.ref_name }}

      - name: Archive
        run: tar -czf wip-${{ github.ref_name }}-darwin-arm64.tar.gz wip-darwin-arm64

      - name: Checksum
        run: sha256sum wip-*.tar.gz > checksums.txt

      - name: Publish
        run: gh release create ${{ github.ref_name }} --generate-notes wip-*.tar.gz checksums.txt
        env:
          GH_TOKEN: ${{ github.token }}
